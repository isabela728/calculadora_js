<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculadora">

    <div class="display"></div>

    <div class="botoes">
      <button class="botao cinza-claro">AC</button>
      <button class="botao cinza-claro">+/-</button>
      <button class="botao cinza-claro">%</button>
      <button class="botao laranja">/</button>
      <button class="botao cinza-escuro">7</button>
      <button class="botao cinza-escuro">8</button>
      <button class="botao cinza-escuro">9</button>
      <button class="botao laranja">X</button>
      <button class="botao cinza-escuro">4</button>
      <button class="botao cinza-escuro">5</button>
      <button class="botao cinza-escuro">6</button>
      <button class="botao laranja">-</button>
      <button class="botao cinza-escuro">1</button>
      <button class="botao cinza-escuro">2</button>
      <button class="botao cinza-escuro">3</button>
      <button class="botao laranja">+</button>
      <button class="botao cinza-escuro zero">0</button>
      <button class="botao cinza-escuro">,</button>
      <button class="botao laranja">=</button>


    </div>

  </div>
  
</body>
</html>
